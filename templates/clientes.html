{% extends "base.html" %}

{% block title %}Clientes{% endblock %}

{% block content %}
<section class="hero">
    <h1>Registrar Cliente</h1>
    <p>Agrega un nuevo cliente al sistema</p>
</section>

<section class="form-section">
    <form action="/registrar_cliente" method="POST" class="form">
        <div class="form-group">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" required>
        </div>
        <div class="form-group">
            <label for="telefono">Teléfono:</label>
            <input type="text" id="telefono" name="telefono" required>
        </div>
        <div class="form-group">
            <label for="direccion">Dirección:</label>
            <input type="text" id="direccion" name="direccion">
        </div>
        <button type="submit" class="btn-submit">Registrar Cliente</button>
    </form>
</section>

<section class="links-section">
    <a href="/ver_clientes" class="btn-link">Ver Clientes Registrados</a>
</section>
{% endblock %}
