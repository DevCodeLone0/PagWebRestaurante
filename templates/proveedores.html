{% extends "base.html" %}

{% block title %}Proveedores{% endblock %}

{% block content %}
<section class="hero">
    <h1>Registrar Proveedor</h1>
    <p>Agrega un nuevo proveedor al sistema</p>
</section>

<section class="form-section">
    <form action="/registrar_proveedor" method="POST" class="form">
        <div class="form-group">
            <label for="nombre">Nombre del contacto:</label>
            <input type="text" id="nombre" name="nombre" required>
        </div>
        <div class="form-group">
            <label for="empresa">Empresa:</label>
            <input type="text" id="empresa" name="empresa" required>
        </div>
        <div class="form-group">
            <label for="telefono">Teléfono:</label>
            <input type="text" id="telefono" name="telefono" required>
        </div>
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="producto">Producto que suministra:</label>
            <input type="text" id="producto" name="producto" required>
        </div>
        <button type="submit" class="btn-submit">Registrar Proveedor</button>
    </form>
</section>

<section class="links-section">
    <a href="/ver_proveedores" class="btn-link">Ver Proveedores Registrados</a>
</section>
{% endblock %}
